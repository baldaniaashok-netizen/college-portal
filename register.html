<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register - College Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-bg">
  <div class="login-card" style="max-width: 500px;">
    <div class="mb-4">
      <h1 class="h4 fw-bold text-primary mb-1">SMMPISR-SVKMICS</h1>
      <p class="text-muted small">LAB Portal Resource Center</p>
    </div>
    <h2>Register</h2>
    <p class="login-card-subtitle">Create a student account to access resource downloads and submit assignments.</p>
    
    <div class="mb-3">
      <input id="name" class="form-control" placeholder="Full Name">
    </div>
    <div class="mb-2">
      <input id="username" class="form-control" type="text" placeholder="Student Username">
    </div>
    <p class="mb-3 text-muted small" style="font-size: 0.8rem; line-height: 1.2;">
      Format: <code>21bca56051</code>, <code>22bsccs55005</code>, or <code>23mscit56012</code>
    </p>
    <div class="mb-3">
      <input id="registerCourse" class="form-control" type="text" placeholder="Course (auto-detected)" readonly>
    </div>
    <div class="mb-3">
      <select id="registerSemester" class="form-select">
        <option value="">Select Semester</option>
        <option value="1">Semester 1</option>
        <option value="2">Semester 2</option>
        <option value="3">Semester 3</option>
        <option value="4">Semester 4</option>
        <option value="5">Semester 5</option>
        <option value="6">Semester 6</option>
      </select>
    </div>
    <div class="mb-3">
      <input id="password" class="form-control" type="password" placeholder="Password">
    </div>
    
    <div class="d-flex align-items-center justify-content-between mb-4">
      <span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle py-2 px-3 small">Account Type: Student</span>
    </div>
    
    <button class="btn btn-primary w-100 py-2" onclick="register()">Create Account</button>
    <p class="mt-4 mb-0 text-center text-muted small">Already have an account? <a href="login.html" class="text-primary fw-semibold text-decoration-none">Login</a></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
