<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - College Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body.login-bg {
      background-image: url("assets/5.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
    }
    .login-panel {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 10px;
      padding: 1.25rem;
    }
  </style>
</head>
<body class="login-bg">
  <div class="login-card">
    <div class="mb-4">
      <h1 class="h4 fw-bold text-primary mb-1">SMMPISR-SVKMICS</h1>
      <p class="text-muted small">LAB Portal Resource Center</p>
    </div>
    <h2>Login</h2>
    <p class="login-card-subtitle">Please enter your credentials to access your dashboard.</p>
    <form id="loginForm">
      <div class="mb-3">
        <input id="username" class="form-control" type="text" placeholder="Username or email" required>
      </div>
      <div class="mb-3">
        <input id="password" class="form-control" type="password" placeholder="Password" required>
      </div>
      <div class="mb-3 text-end">
        <button class="btn btn-link p-0 text-decoration-none small" type="button" onclick="forgotPasswordInfo()">Forgot password?</button>
      </div>
      <button class="btn btn-primary w-100" type="submit">Sign In</button>
    </form>
    <p class="mt-4 mb-0 text-center text-muted small">New user? <a href="register.html" class="text-primary fw-semibold text-decoration-none">Create an Account</a></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
